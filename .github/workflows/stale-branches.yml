name: Automated Branch Cleanup

on:
  schedule:
    # Runs automatically every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allows manual execution for testing

permissions:
  contents: write
  pull-requests: read  # Required for the GitHub CLI to scan for open PRs

jobs:
  cleanup-stale-branches:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history and remote references

      - name: Configure Git Identity
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"

      - name: Run Core Optimization Processor & Generate Summary
        id: branch_processor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Authenticates the 'gh' CLI queries
        shell: pwsh
        run: |
          # --- Configuration Flags ---
          $DryRun = $true            # Set to $false to execute changes live. $true keeps it in safe log-only mode.
          $IgnoreOpenPrs = $true     # Set to $true to protect branches that have active open Pull Requests.
          $StaleDays = 60
          
          $CutoffDate = (Get-Date).AddDays(-$StaleDays)
          $CutoffTimestamp = ([DateTimeOffset]$CutoffDate).ToUnixTimeSeconds()
          
          Write-Host "Looking for branches with no activity since: $($CutoffDate.ToString('yyyy-MM-dd'))"
          Write-Host "Dry Run mode is: $DryRun"
          Write-Host "Ignore branches with open PRs is: $IgnoreOpenPrs"

          # Sync remote tracking references
          git fetch --prune --all

          $staleBranchesFound = @()
          $processedCount = 0

          # Process all remote branches
          $remoteBranches = git branch -r | Where-Object { $_ -notmatch '->' }
          foreach ($rb in $remoteBranches) {
              $branchName = $rb.Replace("origin/", "").Trim()

              # Skip Source of Truth (SOT) and already archived branches
              if ($branchName -eq "master" -or $branchName -eq "develop" -or $branchName -like "stale/*") {
                  continue
              }

              # Check for active open Pull Requests using GitHub CLI
              if ($IgnoreOpenPrs -eq $true) {
                  $prCheck = gh pr list --head $branchName --state open --json number -q '.[].number'
                  if (-not [string]::IsNullOrEmpty($prCheck)) {
                      Write-Host "Skipping branch '$branchName' because it has an active open PR (#$prCheck)."
                      continue
                  }
              }

              # Extract the exact epoch timestamp of the last commit
              $lastCommitTimestampStr = git log -1 --format="%at" "origin/$branchName"
              $lastCommitTimestamp = [long]$lastCommitTimestampStr
              $lastCommitDate = [DateTimeOffset]::FromUnixTimeSeconds($lastCommitTimestamp).DateTime.ToString("yyyy-MM-dd")

              if ($lastCommitTimestamp -lt $CutoffTimestamp) {
                  $newBranchName = "stale/$branchName"
                  $processedCount++
                  
                  # Save data for the reporting matrix
                  $staleBranchesFound += [PSCustomObject]@{
                      OriginalBranch = $branchName
                      NewLocation    = $newBranchName
                      LastActivity   = $lastCommitDate
                  }

                  if ($DryRun -eq $true) {
                      Write-Host "[DRY RUN]: Would archive stale branch '$branchName' to '$newBranchName' and delete original remote reference."
                  } else {
                      Write-Host "Archiving stale branch: $branchName"
                      git checkout -b $branchName "origin/$branchName" *>&1
                      git push origin "${branchName}:refs/heads/${newBranchName}" *>&1
                      git push origin --delete $branchName *>&1
                      git checkout --detach *>&1
                      git branch -D $branchName *>&1
                  }
              }
          }

          # ---------------------------------------------------
          # Generate GitHub Job Actions Summary UI
          # ---------------------------------------------------
          $executionMode = if ($DryRun -eq $true) { "⚠️ DRY RUN (Simulated Report)" } else { "🚀 LIVE CLEANUP (Executed)" }
          
          $summaryHeader = @"
          # Branch Lifecycle Execution Report

          ### Governance Metadata
          * **Execution Profile:** **$executionMode**
          * **Inactivity Cutoff Threshold:** 60 Days Without Commit Events
          * **Target Processing Window:** Inactive since before $($CutoffDate.ToString('yyyy-MM-dd'))
          * **Total Actioned Branches:** **$processedCount**
          * **Protected Core Branches (SOT):** \`master\`, \`develop\`, \`stale/*\`

          ### Actioned Branch Catalog
          "@
          
          $summaryHeader | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          if ($processedCount -gt 0) {
              # Write standard Markdown table headers
              "| Original Source Branch | Archived Destination Space | Last Active Commit |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
              "| :--- | :--- | :--- |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
              
              foreach ($b in $staleBranchesFound) {
                  # Using explicit subexpressions handles object parameter separation inside markdown walls
                  "| `$($b.OriginalBranch) | `$($b.NewLocation) | $($b.LastActivity) |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
              }
          } else {
              "> **No stale branches found meeting the archiving criteria this week. Clean run!**" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
