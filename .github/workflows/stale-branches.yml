name: Automated Branch Cleanup

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup-stale-branches:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Core Optimization Processor
        id: branch_processor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          # Executes the external script safely
          . "${{ github.workspace }}/scripts/cleanup-stale-branches.ps1"

      - name: Send Summary Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🧹 Repo Hygiene Report: Inactive Branches Processed Summary"
          to: "api-platform-alerts@yourcompany.com" 
          from: "GitHub Actions Platform <devops-alerts@yourcompany.com>"
          secure: true
          html_body: file://${{ env.RUNNER_TEMP }}\email_payload.html
