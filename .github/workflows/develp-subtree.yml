name: Sync subtree → Central (develop) V2

on:
  push:
    branches: [develop]

concurrency:
  group: subtree-sync-develop
  cancel-in-progress: true

permissions:
  contents: read

env:
  CENTRAL_REPO: DEFRA/sps-apim-gateway
  CENTRAL_BRANCH: develop
  TEAM_REMOTE_NAME: sps-apim-bng
  TEAM_REPO_URL: DEFRA/sps-apim-bng
  TEAM_BRANCH: develop
  REQUIRE_LINEAR_HISTORY: "false"
  TEAM_WINS_ON_CONFLICT: "true"

  FOLDER_MAP: |
    internal/base/apis/BNGICC=internal/base/apis/bngicc
    internal/base/products/BNGICC-product=internal/base/products/bngicc-product
    internal/base/version sets/BNGICC=internal/base/version sets/bngicc
    internal/base/backends/BNGICC-backend=internal/base/backends/BNGICC-backend
    internal/dev/backends/BNGICC-backend=internal/dev/backends/BNGICC-backend
    internal/tst/backends/BNGICC-backend=internal/tst/backends/BNGICC-backend
    internal/pre/backends/BNGICC-backend=internal/pre/backends/BNGICC-backend

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout team repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH agent & load central deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CENTRAL_SYNC_SSH_KEY }}

      - name: Prime known_hosts
        run: ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Configure Git identity
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global core.ignorecase false

      - name: Clone central repo & sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TS="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          git clone --depth=50 "git@github.com:${CENTRAL_REPO}.git" central-repo
          cd central-repo

          git fetch origin "${CENTRAL_BRANCH}" --depth=50
          git checkout -B "${CENTRAL_BRANCH}" "origin/${CENTRAL_BRANCH}"

          git remote add "${TEAM_REMOTE_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${TEAM_REPO_URL}.git"

          git fetch "${TEAM_REMOTE_NAME}" "${TEAM_BRANCH}"
          git checkout -B __team_branch__ "refs/remotes/${TEAM_REMOTE_NAME}/${TEAM_BRANCH}"

          CHANGES=false

          ####################################################
          # SUBTREE SYNC — DIRECT COMMIT
          ####################################################
          while IFS= read -r mapping; do
            mapping="$(printf '%s' "$mapping" | tr -d '\r')"
            [ -n "$mapping" ] || continue
            case "$mapping" in \#*) continue ;; esac

            SRC="${mapping%%=*}"
            TARGET_PREFIX="${mapping#*=}"

            FOUND=false
            if git cat-file -e "__team_branch__:${SRC}" 2>/dev/null; then FOUND=true; fi
            if git ls-tree -d __team_branch__ -- "${SRC}" | grep -q .; then FOUND=true; fi
            [[ "$FOUND" != "true" ]] && continue

            git checkout __team_branch__
            SPLIT_SHA="$(git subtree split --prefix="${SRC}")"

            git checkout "${CENTRAL_BRANCH}"
            CHANGES=true

            CUSTOM_MESSAGE="subtree: sync ${SRC} → ${TARGET_PREFIX} Source: ${TEAM_REMOTE_NAME}/${TEAM_BRANCH} Timestamp: ${TS}"

            git rm -r --cached --ignore-unmatch "$TARGET_PREFIX" || true
            git clean -fdx -- "$TARGET_PREFIX" || true

            git read-tree --prefix="${TARGET_PREFIX}/" -u "$SPLIT_SHA"

            git add -A "$TARGET_PREFIX"
            TREE=$(git write-tree)
            NEWCOMMIT=$(echo "${CUSTOM_MESSAGE}" | git commit-tree "$TREE" -p HEAD -p "$SPLIT_SHA")
            git reset --hard "$NEWCOMMIT"

          done <<< "${FOLDER_MAP}"

          ####################################################
          # ✅ NAMED VALUES AUTO-SYNC (CORRECT SOURCE)
          ####################################################
          echo "=== Named Values Auto-Sync ==="

          NV_ROOTS=(
            "internal/base/named values"
            "external/base/named values"
            "external/dev/named values"
            "external/tst/named values"
            "external/pre/named values"
            "internal/dev/named values"
            "internal/tst/named values"
            "internal/pre/named values"
          )

          TEAM_REMOTE="sps-apim-bng"
          TEAM_REMOTE_BRANCH="develop"

          # Ensure teams repo is available
          git fetch "$TEAM_REMOTE"

          for ROOT in "${NV_ROOTS[@]}"; do
            echo ""
            echo "🔍 Checking NV root: $ROOT"

            # Guard: NV root must exist in teams repo
            if ! git ls-tree --name-only "$TEAM_REMOTE/$TEAM_REMOTE_BRANCH" "$ROOT" &>/dev/null; then
              echo "⚠️  NV root not present in teams repo, skipping: $ROOT"
              continue
            fi

            # Discover team-owned NV folders
            NV_FOLDERS=$(
              git ls-tree -r --name-only "$TEAM_REMOTE/$TEAM_REMOTE_BRANCH" |
                grep "^${ROOT}/" |
                awk -F/ '{ print $1"/"$2"/"$3"/"$4 }' |
                sort -u
            )

            [[ -z "$NV_FOLDERS" ]] && continue

            echo "$NV_FOLDERS" | while IFS= read -r SRC_NV_FOLDER; do
              [[ -z "$SRC_NV_FOLDER" ]] && continue

              echo "→ Sync NV folder: $SRC_NV_FOLDER"

              # Always materialise folder
              mkdir -p "$SRC_NV_FOLDER"

              # Checkout from TEAMS repo, not subtree branch
              git checkout "$TEAM_REMOTE/$TEAM_REMOTE_BRANCH" -- "$SRC_NV_FOLDER"

              # Stage changes
              git add "$SRC_NV_FOLDER"

            done
          done

          ####################################################
          # PUSH DIRECTLY TO DEVELOP
          ####################################################
          if [[ "$CHANGES" = "false" ]]; then
            echo "No changes to sync."
            exit 0
          fi

          git push origin "${CENTRAL_BRANCH}"
