name: Sync subtree → Central (master)

on:
  push:
    branches: [master]

concurrency:
  group: subtree-pr-master
  cancel-in-progress: true

permissions:
  contents: read

env:
  CENTRAL_REPO: DEFRA/sps-apim-gateway
  BASE_BRANCH: master

  TEAM_REMOTE_NAME: sps-apim-bng
  TEAM_REPO_URL: DEFRA/sps-apim-bng
  TEAM_BRANCH: master

  TEAM_WINS_ON_CONFLICT: "true"

  FOLDER_MAP: |
    internal/base/apis/BNGICC=internal/base/apis/bngicc
    internal/base/products/BNGICC-product=internal/base/products/bngicc-product
    internal/base/version sets/BNGICC=internal/base/version sets/bngicc
    internal/base/namedValues/BNGICC-frontend-clientid=internal/base/named values/CONSUMING-frontend-clientid
    internal/base/namedValues/BNGICC-backend-scopeid=internal/base/named values/BNGICC-backend-scopeid

jobs:
  prepare-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (team repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH agent & load central deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CENTRAL_SYNC_SSH_KEY }}

      - name: Prime known_hosts
        run: ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Configure Git identity
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Clone central and prepare PR branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "=== Clone central repo ==="
          git clone --depth=50 "git@github.com:${CENTRAL_REPO}.git" central-repo
          cd central-repo

          echo "=== Checkout base branch ==="
          git fetch origin "${BASE_BRANCH}" --depth=50
          git checkout "${BASE_BRANCH}"

          echo "=== Add team remote and fetch ==="
          git remote add "${TEAM_REMOTE_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${TEAM_REPO_URL}.git" \
            || git remote set-url "${TEAM_REMOTE_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${TEAM_REPO_URL}.git"
          git fetch "${TEAM_REMOTE_NAME}" "${TEAM_BRANCH}"

          git checkout -B __team_branch__ "refs/remotes/${TEAM_REMOTE_NAME}/${TEAM_BRANCH}"

          CHANGES=false
          PR_BRANCH=""

          while IFS= read -r mapping; do
            [ -n "${mapping}" ] || continue

            SRC="${mapping%%=*}"
            TARGET_PREFIX="${mapping#*=}"

            # === AC1 + AC2 RULE ENFORCEMENT ================================================
            ALLOWED_PREFIXES=(
              "internal/base/namedValues/"
              "internal/dev/namedValues/"
              "internal/tst/namedValues/"
              "internal/pre/namedValues/"
              "external/base/namedValues/"
              "external/dev/namedValues/"
              "external/tst/namedValues/"
              "external/pre/namedValues/"
            )

            ALLOW_CREATE=false
            for prefix in "${ALLOWED_PREFIXES[@]}"; do
              if [[ "${TARGET_PREFIX}" == "$prefix"* ]]; then
                ALLOW_CREATE=true
                break
              fi
            done

            if [[ "$ALLOW_CREATE" == "false" ]]; then
              if ! git ls-tree -r --name-only "${BASE_BRANCH}" | grep -F -q -- "${TARGET_PREFIX}/"; then
                echo "⛔ Skipping '${SRC}' → '${TARGET_PREFIX}' (AC2: non-namedValues folder missing)"
                continue
              fi
            fi
            # ===============================================================================

            echo "→ Processing subtree: SRC='${SRC}' TARGET='${TARGET_PREFIX}'"

            if git ls-tree -r --name-only "__team_branch__" | grep -F -q -- "${SRC}/"; then
              SPLIT_SHA="$(git subtree split -P "${SRC}" "__team_branch__")"
              [ -n "${SPLIT_SHA}" ] || continue

              git checkout "${BASE_BRANCH}"

              CUSTOM_MESSAGE="subtree: merge ${SRC} → ${TARGET_PREFIX} | Source: ${TEAM_REMOTE_NAME}/${TEAM_BRANCH} | Timestamp: ${TIMESTAMP}"

              if [ "${CHANGES}" = "false" ]; then
                PR_BRANCH="pr-subtree/${TEAM_REMOTE_NAME}/$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
                git checkout -b "${PR_BRANCH}"
              fi

              EXTRA=$([ "${TEAM_WINS_ON_CONFLICT}" = "true" ] && echo "-X theirs" || echo "")
              git merge -s subtree -Xsubtree="${TARGET_PREFIX}" ${EXTRA} "${SPLIT_SHA}" \
                --allow-unrelated-histories -m "${CUSTOM_MESSAGE}" || {
                  git merge --abort || true
                  git merge -s ours --no-commit --allow-unrelated-histories "${SPLIT_SHA}"
                  git read-tree --prefix="${TARGET_PREFIX}/" -u "${SPLIT_SHA}"
                  git commit -m "${CUSTOM_MESSAGE}"
              }

              CHANGES=true
            fi

          done <<< "${FOLDER_MAP}"

          if [ "${CHANGES}" = "false" ]; then
            echo "No mapped folders produced changes."
            exit 0
          fi

          git push origin "${PR_BRANCH}" || {
            PR_BRANCH="${PR_BRANCH}-$(date +%s)"
            git branch -m "${PR_BRANCH}"
            git push origin "${PR_BRANCH}"
          }

          echo "PR_BRANCH=${PR_BRANCH}" >> $GITHUB_ENV

      - name: Generate GitHub Action Summary
        run: |
          echo "## Subtree Merge Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Central Repo:** ${CENTRAL_REPO}" >> $GITHUB_STEP_SUMMARY
          echo "**Base Branch:** ${BASE_BRANCH}" >> $GITHUB_STEP_SUMMARY
          echo "**Team Repo:** ${TEAM_REPO_URL}" >> $GITHUB_STEP_SUMMARY
          echo "**PR Branch:** ${PR_BRANCH}" >> $GITHUB_STEP_SUMMARY