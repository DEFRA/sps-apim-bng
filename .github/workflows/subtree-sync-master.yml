name: Sync subtree → Central (master)

on:
  push:
    branches: [master]

concurrency:
  group: subtree-pr-master
  cancel-in-progress: true

permissions:
  contents: read

env:
  CENTRAL_REPO: DEFRA/sps-apim-gateway
  BASE_BRANCH: master

  TEAM_REMOTE_NAME: sps-apim-bng
  TEAM_REPO_URL: DEFRA/sps-apim-bng
  TEAM_BRANCH: master

  TEAM_WINS_ON_CONFLICT: "true"

  # Top-level mapping (source → target)
  # NOTE: Lines are read one-by-one (spaces preserved).
  FOLDER_MAP: |
    internal/base/apis/BNGICC=internal/base/apis/bngicc
    internal/base/products/BNGICC-product=internal/base/products/bngicc-product
    internal/base/version sets/BNGICC=internal/base/version sets/bngicc
    internal/base/namedValues/BNGICC-frontend-clientid=internal/base/named values/CONSUMING-frontend-clientid
    internal/base/namedValues/BNGICC-backend-scopeid=internal/base/named values/BNGICC-backend-scopeid

jobs:
  prepare-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (team repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH agent & load central deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CENTRAL_SYNC_SSH_KEY }}

      - name: Prime known_hosts
        run: ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Configure Git identity
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global core.ignorecase false

      - name: Clone central and prepare PR branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          echo "=== Clone central repo ==="
          git clone --depth=50 "git@github.com:${CENTRAL_REPO}.git" central-repo
          cd central-repo

          echo "=== Checkout base branch ==="
          git fetch origin "${BASE_BRANCH}" --depth=50
          git checkout "${BASE_BRANCH}"

          echo "=== CREATE PR BRANCH — do NOT merge into master ==="
          PR_BRANCH="pr-subtree/${TEAM_REMOTE_NAME}/$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          git checkout -b "${PR_BRANCH}"

          echo "=== Add team remote and fetch ==="
          git remote add "${TEAM_REMOTE_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${TEAM_REPO_URL}.git" \
            || git remote set-url "${TEAM_REMOTE_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${TEAM_REPO_URL}.git"

          git fetch "${TEAM_REMOTE_NAME}" "${TEAM_BRANCH}"

          git checkout -B __team_branch__ "refs/remotes/${TEAM_REMOTE_NAME}/${TEAM_BRANCH}"

          echo "PR_BRANCH=${PR_BRANCH}" >> $GITHUB_ENV

      - name: Diagnostics — team repo structure
        run: |
          echo "=== TEAM BRANCH CONTENT (first 300 entries) ==="
          git ls-tree -r --name-only "__team_branch__" | head -n 300
          echo "=== BNGICC search ==="
          git ls-tree -r --name-only "__team_branch__" | grep -i BNGICC || echo "NONE"

      - name: Process subtree mappings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CHANGES=false

          while IFS= read -r mapping; do
            mapping="$(printf '%s' "$mapping" | tr -d '\r')"
            [ -n "${mapping}" ] || continue
            case "${mapping}" in \#*) continue;; esac

            SRC="${mapping%%=*}"
            TARGET_PREFIX="${mapping#*=}"
            SRC="${SRC#"${SRC%%[![:space:]]*}"}"; SRC="${SRC%"${SRC##*[![:space:]]}"}"
            TARGET_PREFIX="${TARGET_PREFIX#"${TARGET_PREFIX%%[![:space:]]*}"}"
            TARGET_PREFIX="${TARGET_PREFIX%"${TARGET_PREFIX##*[![:space:]]}"}"

            echo "→ Processing subtree:"
            echo "   SRC='${SRC}'"
            echo "   TARGET='${TARGET_PREFIX}'"

            # === AC1 + AC2 ===
            ALLOWED_PREFIXES=(
              "internal/base/namedValues/"
              "internal/dev/namedValues/"
              "internal/tst/namedValues/"
              "internal/pre/namedValues/"
              "external/base/namedValues/"
              "external/dev/namedValues/"
              "external/tst/namedValues/"
              "external/pre/namedValues/"
            )
            ALLOW_CREATE=false
            for prefix in "${ALLOWED_PREFIXES[@]}"; do
              [[ "${TARGET_PREFIX}" == "$prefix"* ]] && ALLOW_CREATE=true && break
            done

            if [[ "${ALLOW_CREATE}" == "false" ]]; then
              if ! git ls-tree -r --name-only "${BASE_BRANCH}" | grep -Fxq "${TARGET_PREFIX}/"; then
                echo "   ⛔ AC2 skip — target missing in central"
                continue
              fi
            fi

            # Ensure source exists
            if ! git ls-tree -r --name-only "__team_branch__" | grep -Fxq "${SRC}/"; then
              echo "   ⛔ Source folder does not exist — skipping"
              continue
            fi

            # Perform subtree split
            git checkout __team_branch__
            SPLIT_SHA="$(git subtree split --prefix="${SRC}")"
            if [ -z "${SPLIT_SHA}" ]; then
              echo "   ⛔ Empty subtree split — skipping"
              continue
            fi

            # ✅ ALWAYS merge into PR branch (NEVER into master)
            git checkout "${PR_BRANCH}"

            CUSTOM_MSG="subtree: merge ${SRC} → ${TARGET_PREFIX} | Team:${TEAM_BRANCH} | TS:${TIMESTAMP}"

            git rm -r --cached --ignore-unmatch "${TARGET_PREFIX}" || true
            git clean -fdx -- "${TARGET_PREFIX}" || true

            git read-tree --prefix="${TARGET_PREFIX}/" -u "${SPLIT_SHA}"
            git add -A "${TARGET_PREFIX}"

            TREE=$(git write-tree)
            NEWCOMMIT=$(echo "${CUSTOM_MSG}" | git commit-tree "$TREE" -p HEAD -p "${SPLIT_SHA}")
            git reset --hard "$NEWCOMMIT"

            CHANGES=true

          done <<< "${FOLDER_MAP}"

          if [[ "${CHANGES}" = "false" ]]; then
            echo "No changes — skipping PR push"
            exit 0
          fi

          echo "=== Push PR branch ==="
          git push origin "${PR_BRANCH}" || {
            echo "Branch conflict — retrying…"
            PR_BRANCH="${PR_BRANCH}-$(date +%s)"
            git branch -m "${PR_BRANCH}"
            git push origin "${PR_BRANCH}"
          }

          echo "✅ PR branch pushed: ${PR_BRANCH}"
          echo "PR_BRANCH=${PR_BRANCH}" >> $GITHUB_ENV

      - name: Generate GitHub Action Summary
        run: |
          {
            echo "## Subtree Sync Summary (MASTER)"
            echo ""
            echo "**PR Branch:** ${PR_BRANCH}"
            echo "**Team Repo:** ${TEAM_REPO_URL}"
            echo "**Team Branch:** ${TEAM_BRANCH}"
            echo "**Base Branch:** ${BASE_BRANCH}"
            echo "**Timestamp:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo ""
            echo "✅ All subtree merges were executed inside the PR branch."
          } >> $GITHUB_STEP_SUMMARY