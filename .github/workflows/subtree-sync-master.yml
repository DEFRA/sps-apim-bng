name: Sync subtree → Central (master)

on:
  push:
    branches: [ master ]

concurrency:
  group: subtree-pr-master
  cancel-in-progress: true

permissions:
  contents: read

env:
  CENTRAL_REPO: DEFRA/sps-apim-gateway
  BASE_BRANCH: master

  TEAM_REMOTE_NAME: sps-apim-bng
  TEAM_REPO_URL: DEFRA/sps-apim-bng
  TEAM_BRANCH: master

  TEAM_WINS_ON_CONFLICT: "true"

  FOLDER_MAP: |
    internal/base/apis/BNGICC=internal/base/apis/bngicc
    internal/base/namedValues/BNGICC-frontend-clientid=internal/base/namedValues/bngicc-frontend-clientid
    internal/base/namedValues/CONSUMING-frontend-clientid=internal/base/namedValues/CONSUMING-frontend-clientid
    internal/base/products/BNGICC-product=internal/base/products/bngicc-product
    internal/base/version\ sets/BNGICC=internal/base/version\ sets/bngicc

jobs:
  prepare-branch:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout (team repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH agent & load central deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CENTRAL_SYNC_SSH_KEY }}

      - name: Prime known_hosts
        run: ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Configure Git
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Clone central repo & prepare base branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          git clone --depth=50 "git@github.com:${CENTRAL_REPO}.git" central-repo
          cd central-repo

          echo "=== Fetch central master explicitly ==="
          git fetch origin "refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}" --depth=50
          git checkout -B "${BASE_BRANCH}" "refs/remotes/origin/${BASE_BRANCH}"

          echo "=== Configure team remote ==="
          git remote add "${TEAM_REMOTE_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${TEAM_REPO_URL}.git" \
            2>/dev/null || git remote set-url "${TEAM_REMOTE_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${TEAM_REPO_URL}.git"

          echo "=== Fetch team branch explicitly ==="
          git fetch "${TEAM_REMOTE_NAME}" \
            "refs/heads/${TEAM_BRANCH}:refs/remotes/${TEAM_REMOTE_NAME}/${TEAM_BRANCH}" --depth=50

          git checkout -B __team_branch__ "refs/remotes/${TEAM_REMOTE_NAME}/${TEAM_BRANCH}"

      - name: DEBUG — show TEAM repo structure
        run: |
          echo "=== TEAM REPO — FIRST 300 PATHS ==="
          git ls-tree -r --name-only "__team_branch__" | head -n 300
          echo "=== SEARCH FOR BNGICC PATHS ==="
          git ls-tree -r --name-only "__team_branch__" | grep -i "BNGICC" || echo "No match"

      - name: Process subtree mappings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CHANGES=false
          PR_BRANCH=""

          while IFS= read -r mapping; do
            [ -n "${mapping}" ] || continue

            SRC="${mapping%%=*}"
            TARGET_PREFIX="${mapping#*=}"

            # === AC1 + AC2 RULES ===
            ALLOWED_PREFIXES=(
              "internal/base/namedValues/"
              "internal/dev/namedValues/"
              "internal/tst/namedValues/"
              "internal/pre/namedValues/"
              "external/base/namedValues/"
              "external/dev/namedValues/"
              "external/tst/namedValues/"
              "external/pre/namedValues/"
            )

            ALLOW_CREATE=false
            for prefix in "${ALLOWED_PREFIXES[@]}"; do
              [[ "${TARGET_PREFIX}" == "$prefix"* ]] && ALLOW_CREATE=true && break
            done

            if [[ "$ALLOW_CREATE" == "false" ]]; then
              if ! git ls-tree -r --name-only "${BASE_BRANCH}" | grep -Fxq "${TARGET_PREFIX}/"; then
                echo "⛔ AC2 SKIP — target missing: ${TARGET_PREFIX}"
                continue
              fi
            fi
            # =========================

            echo "→ Processing subtree: SRC='${SRC}' TARGET='${TARGET_PREFIX}'"

            # ✅ REQUIRED: Source folder must exist
            if ! git ls-tree -r --name-only "__team_branch__" | grep -Fxq "${SRC}/"; then
              echo "⛔ SKIP — source folder missing in team repo: ${SRC}"
              continue
            fi

            SPLIT_SHA=$(git subtree split -P "${SRC}" "__team_branch__")
            if [ -z "${SPLIT_SHA}" ]; then
              echo "⛔ SKIP — empty subtree split for ${SRC}"
              continue
            fi

            git checkout "${BASE_BRANCH}"

            CUSTOM_MESSAGE="subtree: merge ${SRC} → ${TARGET_PREFIX} | Team=${TEAM_BRANCH} | TS=${TIMESTAMP}"

            if [ "${CHANGES}" = "false" ]; then
              PR_BRANCH="pr-subtree/${TEAM_REMOTE_NAME}/$(date +%Y%m%d-%H%M%S)"
              git checkout -b "${PR_BRANCH}"
            fi

            EXTRA=$([ "${TEAM_WINS_ON_CONFLICT}" = "true" ] && echo "-X theirs")

            git merge -s subtree -Xsubtree="${TARGET_PREFIX}" ${EXTRA} "${SPLIT_SHA}" \
              --allow-unrelated-histories -m "${CUSTOM_MESSAGE}" \
              || {
                git merge --abort || true
                git merge -s ours --no-commit "${SPLIT_SHA}"
                git read-tree --prefix="${TARGET_PREFIX}/" -u "${SPLIT_SHA}"
                git commit -m "${CUSTOM_MESSAGE}"
              }

            CHANGES=true

          done <<< "${FOLDER_MAP}"

          if [ "${CHANGES}" = "false" ]; then
            echo "✅ No changes"
            exit 0
          fi

          git push origin "${PR_BRANCH}" || {
            PR_BRANCH="${PR_BRANCH}-$(date +%s)"
            git branch -m "${PR_BRANCH}"
            git push origin "${PR_BRANCH}"
          }

          echo "PR_BRANCH=${PR_BRANCH}" >> $GITHUB_ENV