name: Sync subtree → Central (master)

on:
  push:
    branches: [master]

concurrency:
  group: subtree-pr-master
  cancel-in-progress: true

permissions:
  contents: read

env:
  CENTRAL_REPO: DEFRA/sps-apim-gateway
  BASE_BRANCH: master
  TEAM_REMOTE_NAME: sps-apim-bng
  TEAM_REPO_URL: DEFRA/sps-apim-bng
  TEAM_BRANCH: master
  TEAM_WINS_ON_CONFLICT: "true"

  FOLDER_MAP: |
    internal/base/apis/BNGICC=internal/base/apis/bngicc
    internal/base/products/BNGICC-product=internal/base/products/bngicc-product
    internal/base/version sets/BNGICC=internal/base/version sets/bngicc

jobs:
  prepare-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout team repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CENTRAL_SYNC_SSH_KEY }}

      - name: Prime known_hosts
        run: ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Configure Git identity
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global core.ignorecase false

      - name: Clone central & run sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TS="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          git clone --depth=50 "git@github.com:${CENTRAL_REPO}.git" central-repo
          cd central-repo

          git fetch origin "${BASE_BRANCH}" --depth=50
          git checkout "${BASE_BRANCH}"

          git remote add "${TEAM_REMOTE_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${TEAM_REPO_URL}.git"
          git fetch "${TEAM_REMOTE_NAME}" "${TEAM_BRANCH}"

          git checkout -B __team_branch__ \
            "refs/remotes/${TEAM_REMOTE_NAME}/${TEAM_BRANCH}"

          CHANGES=false
          PR_BRANCH=""

          ####################################################
          # SUBTREE SYNC
          ####################################################
          while IFS= read -r mapping; do
            mapping="$(printf '%s' "$mapping" | tr -d '\r')"
            [ -n "$mapping" ] || continue
            case "$mapping" in \#*) continue ;; esac

            SRC="${mapping%%=*}"
            TARGET_PREFIX="${mapping#*=}"

            echo "→ Processing subtree: $SRC → $TARGET_PREFIX"

            FOUND=false
            if git cat-file -e "__team_branch__:${SRC}" 2>/dev/null; then
              FOUND=true
            elif git ls-tree -d __team_branch__ -- "$SRC" | grep -q . ; then
              FOUND=true
            fi

            if [ "$FOUND" != "true" ]; then
              echo "✘ Source folder not found: $SRC"
              continue
            fi

            git checkout __team_branch__
            SPLIT_SHA="$(git subtree split --prefix="${SRC}")"

            if [ "$CHANGES" = "false" ]; then
              PR_BRANCH="pr-subtree/${TEAM_REMOTE_NAME}/$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
              git checkout "${BASE_BRANCH}"
              git checkout -b "${PR_BRANCH}"
              CHANGES=true
            else
              git checkout "${PR_BRANCH}"
            fi

            CUSTOM_MESSAGE="subtree: merge ${SRC} → ${TARGET_PREFIX} \
            Source: ${TEAM_REMOTE_NAME}/${TEAM_BRANCH} \
            Timestamp: ${TS}"

            git rm -r --cached --ignore-unmatch "$TARGET_PREFIX" || true
            git clean -fdx -- "$TARGET_PREFIX" || true

            git read-tree --prefix="${TARGET_PREFIX}/" -u "$SPLIT_SHA"
            git add -A "$TARGET_PREFIX"

            TREE=$(git write-tree)
            NEWCOMMIT=$(echo "${CUSTOM_MESSAGE}" \
              | git commit-tree "$TREE" -p HEAD -p "$SPLIT_SHA")
            git reset --hard "$NEWCOMMIT"

          done <<< "${FOLDER_MAP}"

          ####################################################
          # NAMED VALUES AUTO-SYNC (FINAL FIX)
          ####################################################
          echo "=== Named Values Auto-Sync ==="

          NV_ROOTS=(
            "internal/base/named values"
            "external/base/named values"
          )

          for ROOT in "${NV_ROOTS[@]}"; do
            echo "Checking NV root: $ROOT"

            echo "--- DEBUG FILES ---"
            git ls-tree -r --name-only __team_branch__ \
              | grep "^${ROOT}/" || echo "(none)"
            echo "-------------------"

            NV_FOLDERS=$(
              git ls-tree -r --name-only __team_branch__ \
                | grep "^${ROOT}/" \
                | sed -E "s#^${ROOT}/([^/]+)/.*#${ROOT}/\1#;" \
                | sort -u
            )

            echo "--- DEBUG FOLDERS ---"
            echo "$NV_FOLDERS"
            echo "----------------------"

            [[ -z "$NV_FOLDERS" ]] && continue

            # FIXED LOOP — SUPPORTS SPACES
            while IFS= read -r SRC_NV; do
              [[ -z "$SRC_NV" ]] && continue

              echo "→ Sync NV: $SRC_NV"

              if [ "$CHANGES" = "false" ]; then
                PR_BRANCH="pr-subtree/${TEAM_REMOTE_NAME}/$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
                git checkout "${BASE_BRANCH}"
                git checkout -b "${PR_BRANCH}"
                CHANGES=true
              else
                git checkout "${PR_BRANCH}"
              fi

              TARGET_NV="$SRC_NV"

              git rm -r --cached --ignore-unmatch "$TARGET_NV" || true
              git clean -fdx -- "$TARGET_NV" || true

              mkdir -p "$TARGET_NV"

              git checkout __team_branch__ -- "$SRC_NV"/
              cp -R "$SRC_NV"/ "$TARGET_NV"/

              git add -A "$TARGET_NV"
              git commit -m "Auto NV Sync: $SRC_NV → $TARGET_NV | TS: $(date -u +"%Y-%m-%dT%H:%M:%SZ')" || true

            done <<< "$NV_FOLDERS"
          done

          ####################################################
          # PUSH PR
          ####################################################
          if [ "$CHANGES" = "false" ]; then
            echo "No changes found."
            exit 0
          fi

          git push origin "$PR_BRANCH" || {
            PR_BRANCH="${PR_BRANCH}-$(date +%s)"
            git branch -m "$PR_BRANCH"
            git push origin "$PR_BRANCH"
          }

          echo "PR_BRANCH=$PR_BRANCH" >> $GITHUB_ENV