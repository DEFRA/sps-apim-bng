name: Sync subtree → Central (develop)

on:
  push:
    branches: [develop]

concurrency:
  group: subtree-sync-develop
  cancel-in-progress: true

permissions:
  contents: read

env:
  CENTRAL_REPO: DEFRA/sps-apim-gateway
  CENTRAL_BRANCH: develop

  TEAM_REMOTE_NAME: sps-apim-bng
  TEAM_REPO_URL: DEFRA/sps-apim-bng
  TEAM_BRANCH: develop

  FOLDER_MAP: |
    internal/base/apis/BNGICC=internal/base/apis/bngicc
    internal/base/products/BNGICC-product=internal/base/products/bngicc-product
    internal/base/version\ sets/BNGICC=internal/base/version\ sets/bngicc
    internal/base/namedValues/BNGICC-frontend-clientid=internal/base/namedValues/CONSUMING-frontend-clientid
    internal/base/namedValues/BNGICC-backend-scopeid=internal/base/namedValues/BNGICC-backend-scopeid

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout (team repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH agent & load central deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CENTRAL_SYNC_SSH_KEY }}

      - name: Prime known_hosts
        run: ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Configure Git identity
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Clone central repo and sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          git clone --depth=50 "git@github.com:${CENTRAL_REPO}.git" central-repo
          cd central-repo

          echo "=== Fetch develop explicitly ==="
          git fetch origin "refs/heads/${CENTRAL_BRANCH}:refs/remotes/origin/${CENTRAL_BRANCH}" --depth=50

          git checkout -B "${CENTRAL_BRANCH}" "refs/remotes/origin/${CENTRAL_BRANCH}"

          echo "=== Add team remote ==="
          git remote add "${TEAM_REMOTE_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${TEAM_REPO_URL}.git" \
            || git remote set-url "${TEAM_REMOTE_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${TEAM_REPO_URL}.git"

          echo "=== Fetch team branch explicitly ==="
          git fetch "${TEAM_REMOTE_NAME}" \
            "refs/heads/${TEAM_BRANCH}:refs/remotes/${TEAM_REMOTE_NAME}/${TEAM_BRANCH}" --depth=50

          git checkout -B __team_branch__ "refs/remotes/${TEAM_REMOTE_NAME}/${TEAM_BRANCH}"

      - name: DEBUG — List first 300 TEAM repo paths
        run: |
          echo "========================================================"
          echo " TEAM REPO — FIRST 300 PATHS"
          echo "========================================================"
          git ls-tree -r --name-only "__team_branch__" | head -n 300
          echo "========================================================"

      - name: DEBUG — Search for BNGICC folders
        run: |
          echo "=== Searching for BNGICC in team repo ==="
          git ls-tree -r --name-only "__team_branch__" | grep -i "BNGICC" || echo "NOT FOUND"
          echo "========================================================"

      - name: Process mappings
        run: |
          set -euo pipefail
          CHANGES=false
          PR_BRANCH=""

          while IFS= read -r mapping; do
            [ -n "${mapping}" ] || continue
            case "${mapping}" in \#*) continue;; esac

            SRC="${mapping%%=*}"
            TARGET_PREFIX="${mapping#*=}"

            # === AC1 + AC2 ======================================================
            ALLOWED_PREFIXES=(
              "internal/base/namedValues/"
              "internal/dev/namedValues/"
              "internal/tst/namedValues/"
              "internal/pre/namedValues/"
              "external/base/namedValues/"
              "external/dev/namedValues/"
              "external/tst/namedValues/"
              "external/pre/namedValues/"
            )

            ALLOW_CREATE=false
            for prefix in "${ALLOWED_PREFIXES[@]}"; do
              [[ "${TARGET_PREFIX}" == "$prefix"* ]] && ALLOW_CREATE=true && break
            done

            if [[ "$ALLOW_CREATE" == "false" ]]; then
              if ! git ls-tree -r --name-only "${CENTRAL_BRANCH}" | grep -F -q -- "${TARGET_PREFIX}/"; then
                echo "⛔ AC2 skip TARGET: '${TARGET_PREFIX}'"
                continue
              fi
            fi
            # ====================================================================

            echo "→ Processing subtree: SRC='${SRC}' TARGET='${TARGET_PREFIX}'"

            # ✅ NEW: Source exists check
            if ! git ls-tree -r --name-only "__team_branch__" | grep -F -q -- "${SRC}/"; then
              echo "⛔ SKIP: SOURCE missing in team repo → '${SRC}'"
              continue
            fi

            SPLIT_SHA="$(git subtree split --prefix="${SRC}")"
            [ -n "${SPLIT_SHA}" ] || { echo "⛔ EMPTY split: ${SRC}"; continue; }

            if [ "${CHANGES}" = "false" ]; then
              PR_BRANCH="pr-subtree-dev/${TEAM_REMOTE_NAME}/$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
              git checkout "${CENTRAL_BRANCH}"
              git checkout -b "${PR_BRANCH}"
            else
              git checkout "${PR_BRANCH}"
            fi

            CUSTOM_MESSAGE="subtree: sync ${SRC} → ${TARGET_PREFIX} | TS=${TS}"

            git rm -r --cached --ignore-unmatch "${TARGET_PREFIX}" || true
            git clean -fdx -- "${TARGET_PREFIX}" || true
            git read-tree --prefix="${TARGET_PREFIX}/" -u "${SPLIT_SHA}"
            git add -A "${TARGET_PREFIX}"

            TREE=$(git write-tree)
            NEWCOMMIT=$(echo "${CUSTOM_MESSAGE}" | git commit-tree "$TREE" -p HEAD -p "${SPLIT_SHA}")
            git reset --hard "$NEWCOMMIT"

            CHANGES=true

          done <<< "${FOLDER_MAP}"

          if [ "${CHANGES}" = "false" ]; then
            echo "✅ No changes."
            exit 0
          fi

          git push origin "${PR_BRANCH}" || {
            PR_BRANCH="${PR_BRANCH}-$(date +%s)"
            git branch -m "${PR_BRANCH}"
            git push origin "${PR_BRANCH}"
          }

          echo "PR_BRANCH=${PR_BRANCH}" >> $GITHUB_ENV