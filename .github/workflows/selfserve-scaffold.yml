
name: APIM Self-Serve Scaffold (Internal/External)

on:
  workflow_dispatch:
    inputs:
      templateSet:
        description: "Which template set to use"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - external

      # Optional override for advanced use (leave empty to auto-use templateSet)
      templatesRoot:
        description: "Optional: override TemplatesRoot path (e.g. internal, external, or custom). Leave blank to use templateSet."
        required: false
        default: ""

      environment:
        description: "Controls environment-specific overlay behaviour (use 'base' to avoid overriding API_BACKEND_URL)."
        required: true
        default: "base"
        type: choice
        options:
          - base
          - dev
          - tst
          - pre
          - prod

      backup:
        description: "Create backup under TemplatesRoot/.bak/<timestamp>"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      diagnostics:
        description: "Enable diagnostics logs + sample snippets (writes to TemplatesRoot/reports/)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  scaffold:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve TemplatesRoot + Run scaffold
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $templateSet   = "${{ github.event.inputs.templateSet }}"
          $overrideRoot  = "${{ github.event.inputs.templatesRoot }}"
          $environment   = "${{ github.event.inputs.environment }}"
          $backup        = "${{ github.event.inputs.backup }}"
          $diagnostics   = "${{ github.event.inputs.diagnostics }}"

          # Decide TemplatesRoot
          if ([string]::IsNullOrWhiteSpace($overrideRoot)) {
            $templatesRoot = $templateSet
          } else {
            $templatesRoot = $overrideRoot
          }

          Write-Host "[INFO] templateSet    = $templateSet"
          Write-Host "[INFO] templatesRoot  = $templatesRoot"
          Write-Host "[INFO] environment    = $environment"
          Write-Host "[INFO] backup         = $backup"
          Write-Host "[INFO] diagnostics    = $diagnostics"

          if (-not (Test-Path -LiteralPath $templatesRoot)) {
            throw "TemplatesRoot path not found in repo: '$templatesRoot'"
          }

          $args = @(
            "-InputJson", "input.json",
            "-Schema",    "./scripts/Scaffold/api-onboarding.schema.json",
            "-Mapping",   "./scripts/Scaffold/mapping.json",
            "-TemplatesRoot", $templatesRoot,
            "-MaterializeTemplateFolders",
            "-AllowMissing"
          )

          # Only pass -Environment when not base (base means: don't override API_BACKEND_URL)
          if ($environment -ne "base") {
            $args += "-Environment"
            $args += $environment
          }

          if ($backup -eq "true") {
            $args += "-BackupBeforeWrite"
          }

          if ($diagnostics -eq "true") {
