
name: APIM Self-Serve Scaffold (Internal/External, No Environment)

on:
  workflow_dispatch:
    inputs:
      templateSet:
        description: "Which template set to use"
        required: true
        default: "internal"
        type: choice
        options: [internal, external]

      templatesRoot:
        description: "Optional override for TemplatesRoot (leave blank to use templateSet)"
        required: false
        default: ""

      backup:
        description: "Create backup under TemplatesRoot/.bak/<timestamp>"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

      diagnostics:
        description: "Enable diagnostics logs + sample snippets (writes to TemplatesRoot/reports/)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve TemplatesRoot + Run scaffold
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $templateSet  = "${{ github.event.inputs.templateSet }}"
          $overrideRoot = "${{ github.event.inputs.templatesRoot }}"
          $backup       = "${{ github.event.inputs.backup }}"
          $diagnostics  = "${{ github.event.inputs.diagnostics }}"

          $templatesRoot = if ([string]::IsNullOrWhiteSpace($overrideRoot)) { $templateSet } else { $overrideRoot }

          Write-Host "[INFO] templateSet   = $templateSet"
          Write-Host "[INFO] templatesRoot = $templatesRoot"
          Write-Host "[INFO] backup        = $backup"
          Write-Host "[INFO] diagnostics   = $diagnostics"

          if (-not (Test-Path -LiteralPath $templatesRoot)) {
            throw "TemplatesRoot path not found in repo: '$templatesRoot'"
          }

          # Log some quick diagnostics to rule out path/casing issues
          Write-Host "[INFO] PSVersion: $($PSVersionTable.PSVersion)"
          Get-ChildItem -LiteralPath $templatesRoot -Recurse -Depth 1 | Select-Object FullName | Out-Host

          # Build common flags
          $backupFlag      = if ($backup -eq "true") { "-BackupBeforeWrite" } else { $null }
          $diagFlag        = if ($diagnostics -eq "true") { "-Diagnostics" } else { $null }
          $diagSamplesFlag = if ($diagnostics -eq "true") { "-DiagSaveSamples" } else { $null }

          # IMPORTANT: Call the script directly with named params (no splatting)
          & ./scripts/Scaffold/ApimApiScaffold.ps1 `
            -InputJson "input.json" `
            -Schema "./scripts/Scaffold/api-onboarding.schema.json" `
            -Mapping "./scripts/Scaffold/mapping.json" `
            -TemplatesRoot $templatesRoot `
            -MaterializeTemplateFolders `
            -AllowMissing `
            @($backupFlag, $diagFlag, $diagSamplesFlag | Where-Object { $_ })

      - name: Commit and push changes
        shell: bash
        run: |
          set -e
          git status
          git diff --name-only

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SET="${{ github.event.inputs.templateSet }}"
          git commit -m "APIM Self-Serve: scaffold + token mapping (set=${SET}) [CI]"
          git push origin HEAD:${{ github.ref_name }}
